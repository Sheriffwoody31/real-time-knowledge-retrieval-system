plugins {
    id 'java'
}

allprojects {
    group = 'com.rag'
    version = '1.0-SNAPSHOT'

    repositories { mavenCentral() }
}

subprojects {
    apply plugin: 'java'

    java {
        toolchain { languageVersion = JavaLanguageVersion.of(17) }
    }

    dependencies {
        testImplementation 'org.junit.jupiter:junit-jupiter:5.10.0'
    }

    test { useJUnitPlatform() }
}