# Root directory for uploaded documents (pdf/, csv/, etc. are created inside).
# Default is ../storage so when the JVM cwd is ingestion-service/ (typical IDE / bootRun), files land in <repo>/storage/.
# Override with an absolute path, or set storage-root=storage when cwd is the repository root.
ingestion.document.storage-root=../storage

# Allow multi-megabyte PDFs (Spring Boot default is often 1MB per file).
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB
